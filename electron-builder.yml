appId: com.mitienda.posropa
productName: VxPlay
directories:
  output: release
  buildResources: build
# Publicación de actualizaciones en GitHub Releases
publish:
  provider: github
  owner: isaacescobar0100
  repo: vxplay
files:
  - out/**/*
  - node_modules/**/*
  - package.json
# Incluir el binario wasm de sql.js sin comprimir en el asar para poder leerlo
asarUnpack:
  - node_modules/sql.js/dist/sql-wasm.wasm
artifactName: ${productName}-Setup-${version}.${ext}
win:
  target:
    - target: nsis
      arch:
        - x64
  # icon: build/icon.ico   # (opcional) coloca un icono aqui
nsis:
  oneClick: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: VxPlay
  # Actualizaciones silenciosas: se aplican solas al reiniciar, sin asistente.
